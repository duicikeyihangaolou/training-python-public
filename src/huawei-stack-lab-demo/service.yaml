apiVersion: v1
kind: Secret
metadata:
  name: lab-demo-obs
type: Opaque
stringData:
  OBS_ENDPOINT: "https://obs.cn-east-3.myhuaweicloud.com"   # Stack：行内 endpoint
  OBS_BUCKET: "test9527-9527"
  OBS_AK: "HPUAL6APYGFDRVCSVXNG"
  OBS_SK: "UEOdUa5UZ88eSSfzj10mKcVm7VCSDl1yQGea3UTk"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # 滚动时至少保持原副本数，利于与 /ready 配合
  template:
    metadata:
      labels:
        app: lab-demo
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: swr-pull
      containers:
        - name: app
          image: swr.cn-east-3.myhuaweicloud.com/cloud-free/lab-demo:0.1.0   # 与 docker push 一致
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: lab-demo-obs
          env:
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lab-demo
spec:
  type: NodePort
  selector:
    app: lab-demo
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 31111
